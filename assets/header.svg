<svg width="1000" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="100%" stop-color="#7aa2f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="250" fill="url(#bg)" rx="12" />
  
  <!-- Engineering Grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363d" stroke-width="1" stroke-opacity="0.4"/>
  </pattern>
  <rect width="1000" height="250" fill="url(#grid)" rx="12" />

  <!-- Accent Border -->
  <rect width="998" height="248" x="1" y="1" fill="none" stroke="#30363d" stroke-width="2" rx="12" />

  <!-- Main Title -->
  <text x="500" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="85" font-weight="900" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)" letter-spacing="2">WOODS</text>
  
  <!-- Subtitle -->
  <text x="500" y="175" font-family="'Courier New', Courier, monospace" font-size="20" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="4">FULL-STACK SOFTWARE ENGINEER</text>
  
  <!-- Tech Accent Elements -->
  <circle cx="45" cy="45" r="4" fill="#ff5f56" />
  <circle cx="65" cy="45" r="4" fill="#ffbd2e" />
  <circle cx="85" cy="45" r="4" fill="#27c93f" />

  <line x1="450" y1="210" x2="550" y2="210" stroke="#58a6ff" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
</svg>
